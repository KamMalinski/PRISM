name: Build PRISM

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            script: .\scripts\build\build_windows.ps1
          - name: macOS
            os: macos-latest
            script: bash scripts/build/build_macos.sh
          - name: Linux
            os: ubuntu-latest
            script: bash scripts/build/build_linux.sh

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-build.txt

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk libgl1 libglib2.0-0 xvfb

      - name: Compile source
        run: python -m compileall -q src scripts

      - name: Build
        shell: ${{ runner.os == 'Windows' && 'pwsh' || 'bash' }}
        run: ${{ matrix.script }}

      - name: Smoke test Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $process = Start-Process .\dist\PRISM\PRISM.exe -ArgumentList "--ui-smoke-test" -PassThru -Wait
          if ($process.ExitCode -ne 0) {
            throw "PRISM smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Smoke test Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a ./dist/PRISM/PRISM --ui-smoke-test

      - name: Smoke test macOS
        if: runner.os == 'macOS'
        run: ./dist/PRISM.app/Contents/MacOS/PRISM --ui-smoke-test

      - uses: actions/upload-artifact@v4
        with:
          name: PRISM-${{ matrix.name }}
          path: dist/
          if-no-files-found: error
